<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Trusted click fallback fixture</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font: 16px/1.4 sans-serif;
    }

    .row {
      box-sizing: border-box;
      width: 360px;
      min-height: 56px;
      margin: 0 0 12px;
      padding: 16px;
      border: 1px solid #bbb;
    }

    #covered-wrap {
      position: relative;
      width: 360px;
      height: 56px;
      margin-bottom: 12px;
    }

    #covered-row,
    #cover {
      position: absolute;
      inset: 0;
    }

    #cover {
      z-index: 2;
      background: rgba(255, 255, 255, 0.95);
    }

    #zero-row {
      width: 0;
      height: 0;
      min-height: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .external-label {
      display: inline-block;
      margin: 0 12px 12px 0;
    }
  </style>
</head>
<body>
  <div id="trusted-row" class="row" role="listitem" tabindex="0">Defne Sokullu Yesterday Photo</div>
  <div id="synthetic-row" class="row" role="listitem" tabindex="0">Normal synthetic row</div>
  <button id="native-button" type="button">Native button</button>
  <div id="destructive-row" class="row" role="listitem" tabindex="0">Delete account</div>
  <span id="indirect-delete-label" class="external-label">Delete account indirectly</span>
  <div id="indirect-delete-row" class="row" role="listitem" tabindex="0" aria-labelledby="indirect-delete-label"></div>
  <span id="turkish-delete-label" class="external-label">Hesabı sil</span>
  <div id="turkish-delete-row" class="row" role="listitem" tabindex="0" aria-labelledby="turkish-delete-label"></div>
  <div id="stateful-row" class="row" role="treeitem" aria-expanded="false" tabindex="0">Expandable row</div>
  <div id="data-state-row" class="row" role="listitem" data-state="closed" tabindex="0">Stateful list row</div>
  <input id="native-input" type="text" value="Native input" aria-label="Native input">
  <select id="native-select" aria-label="Native select"><option>Native select</option></select>
  <div id="editable-row" class="row" role="textbox" aria-label="Editable row" contenteditable="true">Editable row</div>
  <div id="download-row" class="row" role="listitem" data-download tabindex="0">Export report</div>
  <form>
    <div id="form-row" class="row" role="listitem" tabindex="0">Form row</div>
  </form>
  <div id="covered-wrap">
    <div id="covered-row" class="row" role="listitem" tabindex="0">Covered row</div>
    <div id="cover">Overlay</div>
  </div>
  <div id="opacity-row" class="row" role="listitem" tabindex="0">Opacity row</div>
  <div id="pointer-row" class="row" role="listitem" tabindex="0" style="pointer-events:none">Pointer disabled row</div>
  <div id="zero-row" role="listitem" tabindex="0">Zero row</div>
  <p id="status">idle</p>

  <script>
    window.__trustedClickEvents = [];
    document.getElementById('trusted-row').addEventListener('click', (event) => {
      window.__trustedClickEvents.push({ trusted: event.isTrusted, type: event.type });
      if (event.isTrusted) document.getElementById('status').textContent = 'trusted-opened';
    });
    document.getElementById('synthetic-row').addEventListener('click', () => {
      document.getElementById('status').textContent = 'synthetic-opened';
    });
  </script>
</body>
</html>
